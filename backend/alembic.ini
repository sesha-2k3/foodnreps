[alembic]
# Path to the migration scripts, relative to this file (backend/)
script_location = alembic

# Adds the directory containing this file (backend/) to sys.path.
# This is what makes `from core.config import settings` work inside env.py.
prepend_sys_path = .

# Migration filename format: YYYYMMDD_<rev>_<slug>
# Chronological order makes `git log --oneline alembic/versions/` readable.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Truncate the slug (human-readable description) to 40 characters max
truncate_slug_length = 40

# Store all timestamps in UTC
timezone = UTC

# sqlalchemy.url is intentionally absent here.
# It is set programmatically in alembic/env.py from core.config.settings,
# ensuring a single source of truth for the database URL.

# ── Post-write hooks ─────────────────────────────────────────────────────────
# Format newly generated migration files with ruff automatically.
[post_write_hooks]
hooks = ruff-format
ruff-format.type = console_scripts
ruff-format.entrypoint = ruff
ruff-format.options = format REVISION_SCRIPT_FILENAME

# ── Logging ───────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
