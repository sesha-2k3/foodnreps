[project]
name = "foodnreps"
version = "0.1.0"
requires-python = ">=3.12"
description = "Multi-role fitness coaching platform"

dependencies = [
    # Web framework
    "fastapi>=0.115",
    "uvicorn[standard]>=0.29",

    # Database
    "sqlalchemy>=2.0",
    "alembic>=1.13",
    "asyncpg>=0.29",           # async PostgreSQL driver

    # Validation & settings
    "pydantic>=2.0",
    "pydantic-settings>=2.0",

    # Auth
    "python-jose[cryptography]>=3.3",
    "bcrypt>=4.0",
]

[project.optional-dependencies]
dev = [
    # Testing
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",             # async HTTP client for FastAPI TestClient

    # Code quality
    "ruff>=0.5",
    "mypy>=1.10",
    "sqlalchemy[mypy]>=2.0",   # mypy plugin for SQLAlchemy ORM type inference
]

# ─── pytest ───────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
asyncio_mode = "auto"          # all async tests run without @pytest.mark.asyncio
testpaths = ["tests"]
pythonpath = ["."]             # adds backend/ to sys.path so `from core.config import settings` works
filterwarnings = [
    "error",
    "ignore::DeprecationWarning",
    "ignore::pytest.PytestUnraisableExceptionWarning",
]

# ─── mypy ─────────────────────────────────────────────────────────────────────
[tool.mypy]
strict = true
python_version = "3.12"
plugins = ["sqlalchemy.ext.mypy.plugin"]
exclude = ["alembic/"]         # Alembic-generated files are not type-checked

# Relax strict rules inside the test suite only
[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
disallow_incomplete_defs = false

# ─── ruff ─────────────────────────────────────────────────────────────────────
[tool.ruff]
line-length = 88
target-version = "py312"
src = [".", "tests"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes (unused imports, undefined names)
    "I",    # isort (import ordering)
    "N",    # pep8-naming conventions
    "UP",   # pyupgrade (use modern Python syntax)
    "B",    # flake8-bugbear (likely bugs and design issues)
    "C4",   # flake8-comprehensions (better list/dict/set comprehensions)
    "SIM",  # flake8-simplify (simplifiable code patterns)
    "TCH",  # flake8-type-checking (move type-only imports to TYPE_CHECKING)
]
ignore = [
    "E501",  # line too long — handled by ruff format
]

[tool.ruff.lint.isort]
# These are the top-level packages in backend/ — isort treats them as first-party.
# This enforces the import order: stdlib → third-party → first-party (our layers)
known-first-party = [
    "core",
    "domain",
    "application",
    "infrastructure",
    "presentation",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true