services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16
    container_name: food_n_reps_db
    environment:
      POSTGRES_USER: food_n_reps
      POSTGRES_PASSWORD: food_n_reps
      POSTGRES_DB: food_n_reps_db
    ports:
      - "5432:5432"             # exposed to localhost for make dev + pgAdmin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U food_n_reps -d food_n_reps_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── pgAdmin (optional, comment out if not needed) ───────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: food_n_reps_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@foodandreps.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools             # only starts with: docker compose --profile tools up

volumes:
  postgres_data:          # named volume — data persists across `docker compose down`
                          # destroyed only with: docker compose down -v